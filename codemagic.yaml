workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 120
    environment:
      java: 17
    scripts:
      - name: Set up Gradle
        script: |
          gradle wrapper --gradle-version 8.4
          chmod +x gradlew
      - name: Build debug APK
        script: |
          ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/**/*.apk
